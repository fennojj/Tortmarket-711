name: Build and Deploy to tortmarket.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Build Expo web
        run: bunx expo export --platform web --output-dir dist
        env:
          NODE_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_PROJECT_ID }}
          EXPO_PUBLIC_TEAM_ID: ${{ secrets.EXPO_PUBLIC_TEAM_ID }}
          EXPO_PUBLIC_RORK_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_RORK_API_BASE_URL }}
          EXPO_PUBLIC_RORK_APP_KEY: ${{ secrets.EXPO_PUBLIC_RORK_APP_KEY }}
          EXPO_PUBLIC_RORK_AUTH_URL: ${{ secrets.EXPO_PUBLIC_RORK_AUTH_URL }}
          EXPO_PUBLIC_RORK_FUNCTIONS_URL: ${{ secrets.EXPO_PUBLIC_RORK_FUNCTIONS_URL }}
          EXPO_PUBLIC_RORK_TOOLKIT_SECRET_KEY: ${{ secrets.EXPO_PUBLIC_RORK_TOOLKIT_SECRET_KEY }}
          EXPO_PUBLIC_TOOLKIT_URL: ${{ secrets.EXPO_PUBLIC_TOOLKIT_URL }}

      - name: Add CNAME for custom domain
        run: echo "tortmarket.com" > dist/CNAME

      - name: Add SPA 404 fallback
        run: |
          if [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
          else
            echo "dist/index.html missing — build output:" && ls -la dist && exit 1
          fi

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: expo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
